<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/images/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/styles/reset.css">
    <link rel="stylesheet" href="../assets/styles/main.css">
    <link rel="stylesheet" href="../assets/styles/formulario-agendamento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <title>Agendar Aula Experimental - Bridge</title>
</head>

<body>
    <header class="cabecalho animate__animated animate__slideInDown">
        <div class="logo">
            <figure class="logo-imagem">
                <img src="/assets/images/logo.png" alt="logo da escola de idiomas Bridge.">
            </figure>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="/index.html"><i class="bi bi-house"></i>Início</a></li>

                <li><a href="./cursos.html"><i class="bi bi-translate"></i>Cursos</a></li>

                <li><a href="./sobre.html"><i class="bi bi-info-square"></i>Sobre Nós</a></li>

                <li><a href="./area-aluno.html"><i class="bi bi-person-vcard"></i>Área do Aluno</a></li>

                <li><a href="./fale-conosco.html"><i class="bi bi-chat-dots"></i>Fale Conosco</a></li>
            </ul>
        </nav>
    </header>

    <main class="principal">
        <section class="info animate__animated animate__zoomIn">
            <h2 style="text-align: center;">Sua jornada começa aqui</h2>
            <p style="text-align: center;">Experimente nossa metodologia na prática, sem compromisso.</p>

            <div class="agendar-container">
                <form class="form-agendar">
                    <div class="campo">
                        <label>Como prefere sua aula?</label>
                        <div class="tipo-aula">
                            <label class="radio-box">
                                <input type="radio" name="modalidade" value="online" checked>
                                <p>Online</p>
                            </label>
                            <label class="radio-box">
                                <input type="radio" name="modalidade" value="presencial">
                                <p>Presencial</p>
                            </label>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="nome">Seu Nome</label>
                        <input type="text" id="nome" placeholder="Ex: Maria Silva" required>
                    </div>

                    <div class="campo">
                        <label for="whatsapp">WhatsApp</label>
                        <input type="tel" id="whatsapp" placeholder="(31) 9 9999-9999" required>
                    </div>

                    <div class="campo">
                        <label for="idioma">Qual idioma deseja testar?</label>
                        <select id="idioma">
                            <option value="ingles">Inglês (Destaque!)</option>
                            <option value="russo">Russo</option>
                            <option value="chines">Chinês</option>
                            <option value="espanhol">Espanhol</option>
                            <option value="frances">Francês</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-enviar">
                        Solicitar Agendamento
                    </button>

                    <div class="banner-vantagem">
                        <i class="bi bi-shield-check" style="color: green;"></i>
                        <span>Aula 100% gratuita e material incluso.</span>
                    </div>
                </form>
            </div>
        </section>
    </main>


    <footer class="rodape animate__animated animate__slideInUp">
        <div class="contato">
            <h3>Contato</h3>

            <div class="numero">
                <a href="#"><i class="bi bi-whatsapp"></i></a>
                <span>(31) 8888-8888</span>
            </div>

        </div>
        <div class="redes-sociais">
            <h3>Redes Sociais</h3>
            <div class="redes-sociais-icons">
                <a href="#"><i class="bi bi-twitter-x"></i></a>
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-instagram"></i></a>
            </div>

        </div>

        <span class="direitos">&copy; 2026 Todos os direitos reservados.</span>
    </footer>
</body>

</html>
